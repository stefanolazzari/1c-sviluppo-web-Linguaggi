<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="orologio">00:00:00</div>
    
    <script>
        

        function aggiornaOrologio(){
            let adesso = new Date();
            let ora = String(adesso.getHours()).padStart(2,'0');
            let minuti = String(adesso.getMinutes()).padStart(2,'0') ;
            let secondi = String(adesso.getSeconds()).padStart(2,'0');
            console.log(ora + ":" + minuti + ":" + secondi);
            document.getElementById('orologio');
            orologio.textContent = ora + ":" + minuti + ":" + secondi;
        }


        setInterval(aggiornaOrologio,1000);

    </script>
</body>
</html>
